spring:
  application:
    name: server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ptvs}
    username: ${DB_USER:ptvs}
    password: ${DB_PASSWORD:ptvs}
  jpa:
    properties:
      org.hibernate.envers.audit_strategy: org.hibernate.envers.strategy.ValidityAuditStrategy

      org.hibernate.envers.store_data_at_delete: true   # Store full entity on delete
      org.hibernate.envers.audit_table_suffix: _AUD
      # org.hibernate.envers.revision_on_collection_change: true
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
auth:
  jwt-secret: ${AUTH_JWT_SECRET:ptvs-local-jwt-secret-key-change-in-production-min-32chars}
  jwt-expiration-seconds: ${AUTH_JWT_EXPIRATION_SECONDS:3600}
  allowed-origins:
    - ${AUTH_ALLOWED_ORIGIN:http://localhost:5173}
ptvs:
  status-refresh-interval-ms: ${STATUS_REFRESH_INTERVAL_MS:3600000}
